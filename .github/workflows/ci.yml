name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
        env:
          # Build-time env so @t3-oss/env validation passes in CI.
          DATABASE_URL: postgresql://user:pass@localhost:5432/verdoc
          AUTH_JWT_SECRET: ci-placeholder-secret-not-used-at-runtime
          NEXT_PUBLIC_APP_URL: http://localhost:3000
